<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vr-arne</title>
    <meta
      name="description"
      content="A small WebXR prototype for Meta Quest 3."
    />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="./styles.css?v=20260419-tractor2" />
    <script defer src="./app.js?v=20260419-tractor2"></script>
  </head>
  <body>
    <div class="overlay">
      <h1>vr-arne</h1>
      <p>Build: tractor2</p>
      <p>Point at the lane with your right controller.</p>
      <p>The ship will glide toward your aim while the ground scrolls forward.</p>
      <p>Hold the right trigger to tractor a boulder. Release to launch it.</p>
    </div>

    <a-scene
      flight-demo
      background="color: #d9f4ff"
      fog="type: linear; color: #d9f4ff; near: 7; far: 18"
      renderer="colorManagement: true"
      xr-mode-ui="enabled: true"
      webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor"
    >
      <a-entity id="rig" position="0 0 0">
        <a-entity id="head" camera look-controls position="0 1.6 0"></a-entity>

        <a-entity
          id="left-hand"
          laser-controls="hand: left"
          raycaster="objects: .nav-surface, .interactable; far: 20"
        ></a-entity>
        <a-entity
          id="right-hand"
          laser-controls="hand: right"
          raycaster="objects: .nav-surface, .interactable; far: 20"
        ></a-entity>
      </a-entity>

      <a-entity light="type: ambient; color: #ffffff; intensity: 0.85"></a-entity>
      <a-entity
        light="type: directional; color: #fff4d6; intensity: 0.8"
        position="1.5 4 1"
      ></a-entity>

      <a-entity id="desktop-cursor" cursor="rayOrigin: mouse" raycaster="objects: .nav-surface"></a-entity>

      <a-entity id="playfield" position="0 0 0" rotation="10 0 0">
        <a-plane
          position="0 -0.2 -6"
          rotation="-90 0 0"
          width="10.5"
          height="13"
          color="#4c956c"
          material="shader: flat"
        ></a-plane>

        <a-plane
          id="nav-surface"
          class="nav-surface"
          position="0 -0.14 -6"
          rotation="-90 0 0"
          width="9.8"
          height="13"
          color="#ffffff"
          material="transparent: true; opacity: 0.001; side: double"
        ></a-plane>

        <a-entity id="ground-markers"></a-entity>
        <a-entity id="dynamic-objects"></a-entity>

        <a-box
          position="-5.3 0.02 -6"
          width="0.16"
          height="0.18"
          depth="13"
          color="#17324d"
        ></a-box>
        <a-box
          position="5.3 0.02 -6"
          width="0.16"
          height="0.18"
          depth="13"
          color="#17324d"
        ></a-box>

        <a-entity id="target-marker" position="0 -0.08 -2.2">
          <a-ring
            rotation="-90 0 0"
            radius-inner="0.18"
            radius-outer="0.28"
            color="#f4d35e"
            material="shader: flat"
          ></a-ring>
        </a-entity>

        <a-entity id="tutorial-steer" position="0 0.28 -5.4">
          <a-ring
            rotation="-90 0 0"
            radius-inner="0.26"
            radius-outer="0.42"
            color="#f4d35e"
            material="shader: flat"
          ></a-ring>
          <a-text
            value="Point to steer here"
            position="0 0.72 0"
            align="center"
            color="#17324d"
            width="6.5"
          ></a-text>
        </a-entity>

        <a-entity id="tutorial-tractor" position="0 0.55 -6.9" visible="false">
          <a-ring
            rotation="-90 0 0"
            radius-inner="0.3"
            radius-outer="0.46"
            color="#9fd3ff"
            material="shader: flat"
          ></a-ring>
          <a-text
            value="Hold trigger near a boulder"
            position="0 0.76 0"
            align="center"
            color="#17324d"
            width="6.5"
          ></a-text>
        </a-entity>

        <a-entity id="tutorial-throw" position="0 0.72 -8.2" visible="false">
          <a-sphere
            id="tutorial-throw-target"
            radius="0.34"
            color="#f4d35e"
            material="shader: flat; emissive: #f4d35e; emissiveIntensity: 0.65"
          ></a-sphere>
          <a-ring
            id="tutorial-throw-ring"
            radius-inner="0.38"
            radius-outer="0.5"
            color="#f7ede2"
            material="shader: flat"
          ></a-ring>
          <a-text
            id="tutorial-throw-text"
            value="Release to launch at target"
            position="0 0.86 0"
            align="center"
            color="#17324d"
            width="7"
          ></a-text>
        </a-entity>

        <a-circle
          id="ship-shadow"
          position="0 -0.11 -2.2"
          rotation="-90 0 0"
          radius="0.4"
          color="#102030"
          material="shader: flat; transparent: true; opacity: 0.2"
        ></a-circle>

        <a-cylinder
          id="tractor-beam"
          visible="false"
          radius="0.07"
          height="0.5"
          color="#8ae7ff"
          material="shader: flat; transparent: true; opacity: 0.28"
        ></a-cylinder>

        <a-entity id="ship" position="0 0.45 -2.2">
          <a-cylinder
            position="0 0.015 0"
            radius="0.42"
            height="0.065"
            color="#c3ceda"
            material="metalness: 0.8; roughness: 0.25; color: #c3ceda"
          ></a-cylinder>
          <a-sphere
            position="0 0.055 0.02"
            radius="0.16"
            color="#9fd3ff"
            material="metalness: 0.35; roughness: 0.15; emissive: #2f5f85; emissiveIntensity: 0.35"
          ></a-sphere>
          <a-cylinder
            position="0 0.005 0"
            radius="0.3"
            height="0.05"
            color="#8e9aa8"
            material="metalness: 0.75; roughness: 0.3; color: #8e9aa8"
          ></a-cylinder>
          <a-sphere
            position="-0.22 0.065 0.1"
            radius="0.04"
            color="#f4d35e"
            material="shader: flat"
          ></a-sphere>
          <a-sphere
            position="0.22 0.065 0.1"
            radius="0.04"
            color="#f4d35e"
            material="shader: flat"
          ></a-sphere>
        </a-entity>

        <a-plane
          position="0 1.1 -12.9"
          width="12"
          height="4.2"
          color="#d9f4ff"
          material="shader: flat; opacity: 0.92"
        ></a-plane>

      </a-entity>

      <a-sky color="#f2fbff"></a-sky>
    </a-scene>
  </body>
</html>
