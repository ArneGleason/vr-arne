<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vr-arne</title>
    <meta
      name="description"
      content="A small WebXR prototype for Meta Quest 3."
    />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="overlay">
      <h1>vr-arne</h1>
      <p>Point at the lane with your right controller.</p>
      <p>The ship will glide toward your aim while the ground scrolls forward.</p>
    </div>

    <a-scene
      flight-demo
      background="color: #d9f4ff"
      fog="type: linear; color: #d9f4ff; near: 7; far: 18"
      renderer="colorManagement: true"
      xr-mode-ui="enabled: true"
      webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor"
    >
      <a-entity id="rig" position="0 0 0">
        <a-entity id="head" camera look-controls position="0 1.6 0"></a-entity>

        <a-entity
          id="left-hand"
          laser-controls="hand: left"
          raycaster="objects: .nav-surface, .interactable; far: 20"
        ></a-entity>
        <a-entity
          id="right-hand"
          laser-controls="hand: right"
          raycaster="objects: .nav-surface, .interactable; far: 20"
        ></a-entity>
      </a-entity>

      <a-entity light="type: ambient; color: #ffffff; intensity: 0.85"></a-entity>
      <a-entity
        light="type: directional; color: #fff4d6; intensity: 0.8"
        position="1.5 4 1"
      ></a-entity>

      <a-entity id="desktop-cursor" cursor="rayOrigin: mouse" raycaster="objects: .nav-surface"></a-entity>

      <a-entity id="playfield" position="0 0 0" rotation="10 0 0">
        <a-plane
          position="0 -0.2 -5.5"
          rotation="-90 0 0"
          width="9.5"
          height="12"
          color="#4c956c"
          material="shader: flat"
        ></a-plane>

        <a-plane
          id="nav-surface"
          class="nav-surface"
          position="0 -0.14 -5.5"
          rotation="-90 0 0"
          width="8.8"
          height="12"
          color="#ffffff"
          material="transparent: true; opacity: 0.001; side: double"
        ></a-plane>

        <a-entity id="ground-markers"></a-entity>

        <a-box
          position="-4.8 0.02 -5.5"
          width="0.16"
          height="0.18"
          depth="12"
          color="#17324d"
        ></a-box>
        <a-box
          position="4.8 0.02 -5.5"
          width="0.16"
          height="0.18"
          depth="12"
          color="#17324d"
        ></a-box>

        <a-entity id="target-marker" position="0 -0.08 -2.2">
          <a-ring
            rotation="-90 0 0"
            radius-inner="0.18"
            radius-outer="0.28"
            color="#f4d35e"
            material="shader: flat"
          ></a-ring>
        </a-entity>

        <a-entity id="ship" position="0 0.45 -2.2">
          <a-cone
            radius-bottom="0.18"
            radius-top="0.03"
            height="0.7"
            rotation="90 0 0"
            color="#ff7a59"
            material="shader: flat"
          ></a-cone>
          <a-box
            position="0 0.02 0.05"
            width="0.7"
            height="0.05"
            depth="0.24"
            color="#f7ede2"
            material="shader: flat"
          ></a-box>
          <a-box
            position="0 0.12 0.1"
            width="0.18"
            height="0.12"
            depth="0.18"
            color="#17324d"
            material="shader: flat"
          ></a-box>
        </a-entity>

        <a-plane
          position="0 1.15 -11.9"
          width="12"
          height="4.2"
          color="#d9f4ff"
          material="shader: flat; opacity: 0.92"
        ></a-plane>

        <a-text
          value="Point to steer"
          position="0 1.1 -2.8"
          align="center"
          color="#17324d"
          width="7"
        ></a-text>
      </a-entity>

      <a-sky color="#f2fbff"></a-sky>
    </a-scene>
  </body>
</html>
